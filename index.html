<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07110c">
  <title>木内の大冒険 DELUXE</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="hero">
    <p class="eyebrow">AS/400 RPG SYSTEM</p>
    <h1>木内の大冒険 <span>DELUXE</span></h1>
    <p>昭和横丁 × 健康管理 × 会社員RPG</p>
  </header>

  <nav id="topbar" aria-label="ゲームメニュー">
    <button data-menu="quests">クエスト</button>
    <button data-menu="items">アイテム</button>
    <button data-menu="dex">図鑑</button>
    <button data-menu="relations">好感度</button>
    <button data-menu="achievements">称号・実績</button>
    <button data-menu="save">セーブ</button>
    <button id="endingButton">エンディング判定</button>
    <button id="helpButton">遊び方</button>
  </nav>

  <main id="layout">
    <section id="stage" aria-label="ゲーム画面">
      <canvas id="game" width="720" height="520"></canvas>
      <div id="hud" aria-live="polite"></div>
      <div id="mobileControls" aria-label="移動操作">
        <button data-move="ArrowUp" aria-label="上へ">▲</button>
        <div>
          <button data-move="ArrowLeft" aria-label="左へ">◀</button>
          <button data-move="ArrowDown" aria-label="下へ">▼</button>
          <button data-move="ArrowRight" aria-label="右へ">▶</button>
        </div>
      </div>
    </section>
    <aside id="panel" aria-live="polite"></aside>
  </main>

  <dialog id="modal">
    <form method="dialog" class="modal-card">
      <button class="close" value="cancel" aria-label="閉じる">×</button>
      <div id="modalBody"></div>
    </form>
  </dialog>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
